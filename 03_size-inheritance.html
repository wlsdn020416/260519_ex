<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>size inheritance</title>
    <style>
        div{
            background-color: cadetblue;
        }
        .parent{
            width:400px;
            height:200px;
            padding: 10px;
            margin: 10px;
            border: 2px solid black;
            background-color: blueviolet;
            color: yellowgreen;
            font-size: 36px;
            text-align: center;
        }
        .child{
            width:200px;
            height:100px;
            padding: 10px;
            margin: 10px;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div class="parent">부모요소
        <div class="child">자식요소</div>
    </div>
</body>
</html>
